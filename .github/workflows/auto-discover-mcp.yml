name: Auto-Discover MCP Servers

on:
  # Run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run MCP discovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Discovering MCP servers..."
          npm run discover-mcp
          
          if [ -f mcp-discovery-result.json ]; then
            echo "✅ Discovery completed successfully"
            cat mcp-discovery-result.json | jq '.summary'
          else
            echo "❌ Discovery failed - no result file generated"
            exit 1
          fi
      
      - name: Update entries
        run: |
          echo "📝 Updating entries.ts..."
          npm run update-entries
          
          if [ -f mcp-update-summary.json ]; then
            echo "✅ Update completed successfully"
            cat mcp-update-summary.json | jq '.'
          else
            echo "❌ Update failed - no summary file generated"
            exit 1
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/data/entries.ts; then
            echo "No changes detected in entries.ts"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in entries.ts"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate PR body
        if: steps.check_changes.outputs.has_changes == 'true'
        id: pr_body
        run: |
          echo "📊 Generating PR description..."
          
          # Read summary from JSON
          SUMMARY=$(cat mcp-update-summary.json)
          ADDED=$(echo "$SUMMARY" | jq -r '.entriesAdded')
          UPDATED=$(echo "$SUMMARY" | jq -r '.entriesUpdated')
          PRESERVED=$(echo "$SUMMARY" | jq -r '.entriesPreserved')
          
          # Build PR body
          PR_BODY="## 🤖 Automated MCP Server Discovery Update

This PR was automatically generated by the MCP auto-discovery workflow.

### 📊 Summary

- **New entries added:** $ADDED
- **Existing entries updated:** $UPDATED
- **Entries preserved:** $PRESERVED

### ✨ New Entries

"
          
          # Add new entries list
          if [ "$ADDED" -gt 0 ]; then
            echo "$SUMMARY" | jq -r '.changes[] | select(.action == "added") | "- `" + .id + "`"' >> pr_body_temp.txt
            PR_BODY="${PR_BODY}$(cat pr_body_temp.txt)

"
          else
            PR_BODY="${PR_BODY}_No new entries_

"
          fi
          
          # Add updated entries section
          PR_BODY="${PR_BODY}### 🔄 Updated Entries

"
          
          if [ "$UPDATED" -gt 0 ]; then
            echo "$SUMMARY" | jq -r '.changes[] | select(.action == "updated") | "- `" + .id + "` (updated: " + (.fields | join(", ")) + ")"' >> pr_body_updated.txt
            PR_BODY="${PR_BODY}$(cat pr_body_updated.txt)

"
          else
            PR_BODY="${PR_BODY}_No entries updated_

"
          fi
          
          # Add preserved fields info
          PR_BODY="${PR_BODY}### 🔒 Preserved Fields

The following fields are manually maintained and were preserved during the update:
"
          echo "$SUMMARY" | jq -r '.fieldsPreserved[] | "- `" + . + "`"' >> pr_body_preserved.txt
          PR_BODY="${PR_BODY}$(cat pr_body_preserved.txt)

---

**Note:** Please review the changes carefully before merging. The discovery process automatically fetches data from GitHub repositories with the \`mcp-server\` topic and at least 10 stars.

**Discovery Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
"
          
          # Save to file for create-pull-request action
          echo "$PR_BODY" > pr_body.txt
          
          # Also output for debugging
          echo "PR body generated successfully"
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto-update MCP server entries from discovery'
          committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          branch: auto-update-mcp-servers-${{ github.run_id }}
          delete-branch: true
          title: '🤖 Auto-update MCP servers - ${{ github.run_number }}'
          body-path: pr_body.txt
          labels: |
            automated
            mcp-servers
            dependencies
          assignees: ${{ github.repository_owner }}
          draft: false
      
      - name: Workflow summary
        if: always()
        run: |
          echo "## 🎯 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f mcp-discovery-result.json ]; then
            echo "### Discovery Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat mcp-discovery-result.json | jq '.summary' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f mcp-update-summary.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Update Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat mcp-update-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Pull request created successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ **No changes detected - no PR created**" >> $GITHUB_STEP_SUMMARY
          fi
